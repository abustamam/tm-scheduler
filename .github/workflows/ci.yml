name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tm_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/tm_test
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Lint & format
        run: bun run check
      - name: Typecheck
        run: bunx tsc --noEmit
      # Fail if schema.ts has changes not captured in a committed migration.
      # `drizzle-kit generate` writes a new migration only when the schema has
      # drifted from the snapshots; a non-empty git diff means someone edited
      # schema.ts without running `bun run db:generate`.
      - name: Migrations in sync with schema
        run: |
          bunx drizzle-kit generate
          if [ -n "$(git status --porcelain drizzle)" ]; then
            echo "::error::schema.ts has changes with no migration. Run 'bun run db:generate' and commit the result."
            git --no-pager diff drizzle
            exit 1
          fi
      # Apply the committed migrations (not `drizzle-kit push`) so CI exercises
      # the same migration files prod runs at deploy — catches a migration that
      # fails to apply, and keeps the test schema honest to the migration history.
      - name: Apply migrations
        run: DATABASE_URL=$TEST_DATABASE_URL bun run db:migrate
      - name: Test
        run: bun run test
      - name: Build (client bundle + migrate runner)
        run: bun run build

  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # wxt prepare generates the .wxt/ types the tsconfig extends; run it
      # explicitly rather than relying on postinstall lifecycle behavior.
      - name: Generate WXT types
        run: bunx wxt prepare
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Test
        run: bun run test
      # WXT_GAVELUP_URL unset → production default (https://gavelup.app),
      # which is the shape that ships.
      - name: Build
        run: bun run build
